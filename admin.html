<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPA Haute-Loire - Administration</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <input type="checkbox" id="menu-toggle" class="menu-checkbox" />

      <label for="menu-toggle" class="burger-menu">
        <span></span><span></span><span></span>
      </label>

      <div class="logo">
        <a href="index.html"
          ><img src="images/Logo-1.webp" alt="Logo SPA Haute-Loire"
        /></a>
      </div>

      <nav>
        <ul>
          <li><a href="adopter.html">Adopter</a></li>
          <li><a href="aider.html">Nous aider</a></li>
          <li><a href="#contact">Contact</a></li>
          <li><a href="boutique.html">Boutique</a></li>
        </ul>
      </nav>

      <div class="user-access">
        <a href="connexion.html">
          <img src="images/connexion.webp" alt="Icône utilisateur" />
        </a>
      </div>
    </header>
    <main class="admin-main">
      <div class="admin-wrapper">
        <section class="title-section">
          <h1>Espace Admin</h1>
          <p class="admin-subtitle">Gestion des pensionnaires</p>
          <button class="login-button">+ Ajouter un animal</button>
        </section>

        <section class="form-section">
          <div class="admin-table">
            <div class="animal-row">
              <div class="animal-main-info">
                <div class="animal-thumb">
                  <img src="images/lynx.webp" alt="Gire" />
                </div>
                <div class="animal-info">
                  <span class="animal-name">Gire</span>
                  <span class="animal-specie">Chat - 2 ans</span>
                </div>
              </div>
              <div class="action-group">
                <button class="edit-btn">Modifier</button>
                <button class="delete-btn">Supprimer</button>
              </div>
            </div>

            <div class="animal-row">
              <div class="animal-main-info">
                <div class="animal-thumb">
                  <img src="images/minou.webp" alt="Backshoteur" />
                </div>
                <div class="animal-info">
                  <span class="animal-name">Backshoteur</span>
                  <span class="animal-specie">Chien - 4 ans</span>
                </div>
              </div>
              <div class="action-group">
                <button class="edit-btn">Modifier</button>
                <button class="delete-btn">Supprimer</button>
              </div>
            </div>

            <div class="animal-row">
              <div class="animal-main-info">
                <div class="animal-thumb">
                  <img src="images/roco.webp" alt="Grimbert" />
                </div>
                <div class="animal-info">
                  <span class="animal-name">Grimbert</span>
                  <span class="animal-specie">Chat - 1 an</span>
                </div>
              </div>
              <div class="action-group">
                <button class="edit-btn">Modifier</button>
                <button class="delete-btn">Supprimer</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-left">
          <a
            href="https://www.facebook.com/people/SPA-de-la-Haute-Loire/100064272296018/"
            target="_blank"
            class="facebook-link"
            >Facebook</a
          >
        </div>

        <div class="footer-right">
          <a href="mentions-legales.html" class="legal-link"
            >Mentions Légales</a
          >
        </div>
      </div>
    </footer>
  </body>
</html>
